name: AI-operated package release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing immutable release tag to recover."
        required: true
        type: string
      confirm:
        description: "Type recover-<tag> to retry the canonical release."
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: ai-release-${{ inputs.tag || github.ref_name }}
  cancel-in-progress: false

env:
  RELEASE_TAG: ${{ inputs.tag || github.ref_name }}

jobs:
  validate:
    runs-on: ubuntu-24.04
    outputs:
      version: ${{ steps.release.outputs.version }}
      tag: ${{ steps.release.outputs.tag }}
      prerelease: ${{ steps.release.outputs.prerelease }}
    steps:
      - name: Validate recovery confirmation
        if: github.event_name == 'workflow_dispatch'
        env:
          RECOVERY_CONFIRM: ${{ inputs.confirm }}
        run: test "$RECOVERY_CONFIRM" = "recover-$RELEASE_TAG"

      - name: Check out immutable tag
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ env.RELEASE_TAG }}
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - name: Validate tag, version, changelog, repository, and main ancestry
        id: release
        run: python scripts/ai_release_guard.py --tag "$RELEASE_TAG" --github-output "$GITHUB_OUTPUT"

      - name: Compile Python
        run: python -m compileall -q scripts mcp/server ai_dememory_tool

      - name: Distribution safety guards
        run: |
          python scripts/ai_dememory.py publish-guard
          python scripts/ai_dememory.py artifact-guard
          python scripts/ai_dememory.py validate
          python scripts/ai_dememory.py secret-scan
          python scripts/ai_dememory.py verify-mcp
          python scripts/ai_dememory.py release-check

      - name: Unit and runtime tests
        run: |
          python -m unittest discover -s tests
          python scripts/ai_dememory.py install-smoke
          python scripts/ai_dememory.py install-smoke --skip-package --docker --image ai-dememory:release

  build:
    needs: validate
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      id-token: write
      attestations: write
    steps:
      - name: Check out immutable tag
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ needs.validate.outputs.tag }}
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - name: Install pinned build tooling
        run: python -m pip install build==1.2.2.post1 twine==6.1.0 setuptools==80.9.0 wheel==0.45.1

      - name: Build distributions once
        shell: bash
        run: |
          export SOURCE_DATE_EPOCH="$(git show -s --format=%ct HEAD)"
          python -m build --no-isolation

      - name: Check and smoke exact artifacts
        env:
          RELEASE_VERSION: ${{ needs.validate.outputs.version }}
        run: |
          python -m twine check dist/*
          python scripts/release_artifact_smoke.py --dist dist --version "$RELEASE_VERSION"

      - name: Generate checksums
        shell: bash
        run: sha256sum dist/* | sort -k2 > SHA256SUMS

      - name: Attest built distributions
        uses: actions/attest@f6bf1532d7d6793fce74eac584813a8eee607999 # v4
        with:
          subject-path: dist/*

      - name: Upload the tested release bundle
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: python-release-${{ needs.validate.outputs.tag }}
          path: |
            dist/
            SHA256SUMS
          if-no-files-found: error
          retention-days: 30

  publish-testpypi:
    needs: [validate, build]
    if: needs.validate.outputs.prerelease == 'true'
    runs-on: ubuntu-24.04
    environment:
      name: testpypi
      url: https://test.pypi.org/p/ai-dememory
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Download tested release bundle
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: python-release-${{ needs.validate.outputs.tag }}
          path: release-bundle
      - name: Publish prerelease to TestPyPI with OIDC
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # release/v1
        with:
          packages-dir: release-bundle/dist/
          repository-url: https://test.pypi.org/legacy/

  publish-pypi:
    needs: [validate, build]
    if: needs.validate.outputs.prerelease == 'false'
    runs-on: ubuntu-24.04
    environment:
      name: pypi
      url: https://pypi.org/p/ai-dememory
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Download tested release bundle
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: python-release-${{ needs.validate.outputs.tag }}
          path: release-bundle
      - name: Publish stable release to PyPI with OIDC
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # release/v1
        with:
          packages-dir: release-bundle/dist/

  verify-and-release:
    needs: [validate, build, publish-testpypi, publish-pypi]
    if: >-
      always() && needs.build.result == 'success' &&
      (needs.publish-testpypi.result == 'success' || needs.publish-pypi.result == 'success')
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - name: Verify the published package from its index
        env:
          RELEASE_VERSION: ${{ needs.validate.outputs.version }}
          PRERELEASE: ${{ needs.validate.outputs.prerelease }}
        shell: bash
        run: |
          if [[ "$PRERELEASE" == "true" ]]; then
            INDEX_URL="https://test.pypi.org/simple/"
          else
            INDEX_URL="https://pypi.org/simple/"
          fi
          for attempt in {1..12}; do
            if python -m pip install --no-cache-dir --index-url "$INDEX_URL" "ai-dememory==$RELEASE_VERSION"; then
              ai-dememory --help
              exit 0
            fi
            sleep 10
          done
          exit 1

      - name: Download release bundle
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: python-release-${{ needs.validate.outputs.tag }}
          path: release-bundle

      - name: Create immutable GitHub Release with evidence
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ needs.validate.outputs.tag }}
          PRERELEASE: ${{ needs.validate.outputs.prerelease }}
        shell: bash
        run: |
          EXTRA=()
          if [[ "$PRERELEASE" == "true" ]]; then EXTRA+=(--prerelease); fi
          gh release create "$RELEASE_TAG" \
            release-bundle/dist/* release-bundle/SHA256SUMS \
            --verify-tag --generate-notes --title "ai-dememory $RELEASE_TAG" "${EXTRA[@]}"
