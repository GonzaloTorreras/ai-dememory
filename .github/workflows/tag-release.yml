name: Tag release after green CI

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]

permissions:
  contents: write

concurrency:
  group: ai-release-tagger
  cancel-in-progress: false

jobs:
  tag:
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push' &&
      github.event.workflow_run.head_repository.full_name == github.repository &&
      github.event.workflow_run.head_branch == 'main' &&
      vars.AI_RELEASE_ENABLED == 'true'
    runs-on: ubuntu-24.04
    steps:
      - name: Check out the verified main commit
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 0
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - name: Resolve and validate release tag
        id: release
        run: python scripts/ai_release_guard.py --version-only --github-output "$GITHUB_OUTPUT"

      - name: Skip an existing immutable tag
        id: existing
        env:
          RELEASE_TAG: ${{ steps.release.outputs.tag }}
        run: |
          if git show-ref --verify --quiet "refs/tags/$RELEASE_TAG"; then
            test "$(git rev-parse "$RELEASE_TAG^{commit}")" = "$(git rev-parse HEAD)"
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create annotated release tag
        if: steps.existing.outputs.exists == 'false'
        env:
          RELEASE_TAG: ${{ steps.release.outputs.tag }}
        run: |
          test "$(git rev-parse HEAD)" = "${{ github.event.workflow_run.head_sha }}"
          git config user.name "ai-dememory release operator"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "$RELEASE_TAG" -m "ai-dememory $RELEASE_TAG"
          git push origin "$RELEASE_TAG"
