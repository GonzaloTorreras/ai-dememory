name: Publish Python Package

on:
  workflow_dispatch:
    inputs:
      repository:
        description: "Package index to publish to."
        required: true
        default: "testpypi"
        type: choice
        options:
          - testpypi
          - pypi
      confirm:
        description: "Type publish to confirm package upload."
        required: true
        type: string
      pr_url:
        description: "GitHub PR URL carrying release review and CI evidence."
        required: true
        type: string

permissions:
  contents: read

jobs:
  validate-inputs:
    name: Validate publish confirmation
    runs-on: ubuntu-latest
    steps:
      - name: Require explicit confirmation
        if: ${{ inputs.confirm != 'publish' }}
        run: |
          echo "Set confirm=publish to build and publish distributions." >&2
          exit 1

  preflight:
    name: Pre-publish verification
    needs: validate-inputs
    runs-on: ubuntu-latest
    env:
      AI_DEMEMORY_PR_URL: ${{ inputs.pr_url }}
      PUBLISH_REPOSITORY: ${{ inputs.repository }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Compile Python
        run: python -m compileall -q scripts mcp/server ai_dememory_tool

      - name: Publish workflow guard
        run: python scripts/ai_dememory.py publish-guard

      - name: Generated artifact guard
        run: python scripts/ai_dememory.py artifact-guard

      - name: Validate memory schema
        run: python scripts/ai_dememory.py validate

      - name: Secret scan
        run: python scripts/ai_dememory.py secret-scan

      - name: Verify MCP contract
        run: python scripts/ai_dememory.py verify-mcp

      - name: Release readiness check
        run: python scripts/ai_dememory.py release-check

      - name: Package install smoke
        run: python scripts/ai_dememory.py install-smoke

      - name: Package build smoke
        run: python scripts/ai_dememory.py package-build-smoke --check-clean

      - name: Docker local MCP smoke
        run: python scripts/ai_dememory.py install-smoke --skip-package --docker --image ai-dememory:publish

      - name: Strict publish readiness plan
        run: python scripts/ai_dememory.py publish-plan --repository "$PUBLISH_REPOSITORY" --pr-url "$AI_DEMEMORY_PR_URL" --strict

  build:
    name: Build distributions
    needs: preflight
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tooling
        run: python -m pip install --upgrade build twine

      - name: Build package
        run: python -m build

      - name: Check distributions
        run: python -m twine check dist/*

      - name: Upload distributions
        uses: actions/upload-artifact@v4
        with:
          name: python-distributions
          path: dist/
          if-no-files-found: error

  publish-testpypi:
    name: Publish to TestPyPI
    needs: build
    if: ${{ inputs.repository == 'testpypi' && inputs.confirm == 'publish' }}
    runs-on: ubuntu-latest
    environment: testpypi
    permissions:
      actions: read
      contents: read
      id-token: write
    steps:
      - name: Download distributions
        uses: actions/download-artifact@v4
        with:
          name: python-distributions
          path: dist/

      - name: Publish package distributions to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/

  publish-pypi:
    name: Publish to PyPI
    needs: build
    if: ${{ inputs.repository == 'pypi' && inputs.confirm == 'publish' }}
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      actions: read
      contents: read
      id-token: write
    steps:
      - name: Download distributions
        uses: actions/download-artifact@v4
        with:
          name: python-distributions
          path: dist/

      - name: Publish package distributions to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
